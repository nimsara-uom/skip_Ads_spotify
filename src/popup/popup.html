<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Stupefy!</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="header">
    <img src="../../icons/icon48.png" alt="Stupefy! icon" class="logo" />
    <div>
      <h1 class="title">Stupefy!</h1>
      <p class="subtitle">Spotify Ad Handler</p>
    </div>
  </div>

  <div class="status-section">
    <div class="status-row">
      <span class="label">Status</span>
      <!-- We'll wire this toggle in Commit 19 -->
      <label class="toggle" id="toggle-label">
        <input type="checkbox" id="enabled-toggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="stats-section">
    <p class="stats-label">Ads handled today</p>
    <p class="stats-count" id="stats-count">—</p>
  </div>

  <div class="mode-section">
    <p class="label">Mode</p>
    <select id="mode-select">
      <option value="auto">⚡ Auto (skip → speed → mute)</option>
      <option value="mute">🔇 Mute only</option>
      <option value="speed">⏩ Speed only</option>
    </select>
  </div>


  <script src="popup.js"></script>
</body>

</html>
